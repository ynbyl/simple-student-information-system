<!DOCTYPE html>
{# base layout used by all pages - navbar and head go here so we dont repeat them #}
<html data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SSIS{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
    crossorigin="anonymous"
  >
</head>
<body>

  <!-- shared navbar for all pages -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('students.index') }}">SSIS</a>
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('students.index') }}">Students</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('courses.listCourses') }}">Courses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('colleges.listColleges') }}">Colleges</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-danger" href="{{ url_for('user.logout') }}">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- page content goes here -->
  <div class="container-fluid px-4 mt-3">
    {% block content %}{% endblock %}
  </div>

  <!-- bootstrap js needed for the delete confirmation modal to work -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"
  ></script>

</body>
</html>
